# Isolated test profile: in-memory DB; no external Postgres, Redis, Kafka, Elasticsearch, or IdP
spring:
  datasource:
    url: jdbc:h2:mem:bac_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchRepositoriesAutoConfiguration
